<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>XcTxTeaM EeMoT | راقص فري فاير</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0a, #000000);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        /* كونتينر رئيسي */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* هيدر أنيق */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        .header h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #ffffff, #aa2e2e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            text-shadow: 0 0 10px rgba(170, 46, 46, 0.3);
        }
        .header p {
            color: #bbb;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* بطاقة الإدخال */
        .input-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(200, 50, 50, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .field-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .field {
            flex: 1;
            min-width: 180px;
        }
        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #cc5555;
            margin-bottom: 8px;
        }
        .field input, .uid-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #3a2a2a;
            border-radius: 20px;
            padding: 12px 18px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .field input:focus, .uid-input:focus {
            outline: none;
            border-color: #cc3333;
            box-shadow: 0 0 8px rgba(204,51,51,0.5);
            background: #222;
        }

        /* حاويات UIDs ديناميكية */
        .uids-area {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 16px;
            margin-top: 10px;
        }
        .uids-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .uids-header span {
            font-size: 0.85rem;
            color: #dd8888;
        }
        .add-uid-btn {
            background: linear-gradient(135deg, #a22, #600);
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .add-uid-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #c33, #800);
        }
        .uids-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .uid-input {
            flex: 1;
            min-width: 110px;
            background: #151515;
        }

        /* شريط البحث والفلترة */
        .search-bar {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
        }
        .search-bar input {
            width: 100%;
            max-width: 500px;
            background: #111;
            border: 1px solid #3a2a2a;
            border-radius: 50px;
            padding: 14px 24px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        .search-bar input:focus {
            border-color: #cc4444;
            box-shadow: 0 0 10px rgba(204,68,68,0.3);
            outline: none;
        }

        /* أزرار فلتر OB */
        .ob-filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .ob-btn {
            background: #1f1f1f;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: #ccc;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .ob-btn.active {
            background: linear-gradient(135deg, #b33, #800);
            color: white;
            box-shadow: 0 2px 8px rgba(180,0,0,0.4);
        }
        .ob-btn:hover:not(.active) {
            background: #2c2c2c;
            color: #ffaaaa;
        }

        /* شبكة الإيموجيات */
        .emote-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 8px 4px 20px 4px;
            border-radius: 28px;
        }
        .emote-card {
            background: linear-gradient(145deg, #111, #0a0a0a);
            border-radius: 28px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2a1a1a;
        }
        .emote-card:hover {
            transform: translateY(-6px);
            border-color: #aa4444;
            box-shadow: 0 12px 24px rgba(170,0,0,0.3);
            background: #161616;
        }
        .emote-card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px black);
        }
        .emote-id {
            font-size: 11px;
            color: #aa7777;
            margin-top: 10px;
            word-break: break-all;
        }
        .emote-name {
            font-size: 13px;
            font-weight: 500;
            color: #e0e0e0;
            margin-top: 4px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0 20px;
        }
        .pagination button {
            background: #1e1e1e;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        .pagination button.active-page {
            background: #b33;
            box-shadow: 0 0 6px red;
        }

        /* Toast messages */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f1f1f;
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 12px 28px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border-left: 6px solid #b33;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .toast.success { border-left-color: #2e7d32; background: #1e2a1e; }
        .toast.error { border-left-color: #c62828; background: #2a1a1a; }

        /* الفوتر */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #2a1a1a;
            color: #aa8888;
            font-size: 0.8rem;
        }
        footer a {
            color: #dd5555;
            text-decoration: none;
        }

        /* سكرول بار احمرار */
        .emote-grid::-webkit-scrollbar {
            width: 6px;
        }
        .emote-grid::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }
        .emote-grid::-webkit-scrollbar-thumb {
            background: #b33;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>𝕏𝕔𝕋𝕩𝕋𝕖𝕒𝕄 𝔼𝕖𝕄𝕠𝕋</h1>
        <p>إضغط على أي إيموجي لإرساله مباشرة إلى فريقك 🔥</p>
    </div>

    <!-- لوحة الإدخال -->
    <div class="input-card">
        <div class="field-group">
            <div class="field">
                <label>🏷️ كود الفريق</label>
                <input type="text" id="teamCode" placeholder="مثال: ABC123">
            </div>
            <div class="field">
                <label>🔑 API Key</label>
                <input type="text" id="apiKey" value="ziko" placeholder="api_key">
            </div>
        </div>

        <div class="uids-area">
            <div class="uids-header">
                <span>👥 معرفات اللاعبين (UID) - حتى 5</span>
                <button class="add-uid-btn" id="addUidBtn">+ إضافة UID</button>
            </div>
            <div id="uidsContainer" class="uids-container">
                <input type="text" class="uid-input" placeholder="UID 1">
            </div>
            <div style="font-size: 12px; color:#a55; margin-top: 8px;">※ يمكن إضافة حتى 5 لاعبين</div>
        </div>
    </div>

    <!-- بحث وتصفية -->
    <div class="search-bar">
        <input type="text" id="searchBox" placeholder="🔍 بحث بالاسم أو المعرف (مثل 909000045)">
    </div>
    <div id="obFilterContainer" class="ob-filters"></div>

    <!-- شبكة الإيموجيات -->
    <div id="itemsGrid" class="emote-grid">جاري التحميل...</div>
    <div class="pagination" id="pagination"></div>

    <footer>
        XcTxTeaM EeMoT | <a href="https://t.me/ZikoB0SS" target="_blank">@ZikoB0SS</a>
    </footer>
</div>

<script>
    // ================== التكوينات ==================
    const API_BASE = "https://xctxteam-bosses-production.up.railway.app";
    const API_DANCE = "/dance";
    const API_KEY = "ziko";  // القيمة الافتراضية
    const ITEM_DATA_URL = "https://raw.githubusercontent.com/4737647734/Emote/main/itemData.json";
    const FALLBACK_IMG = "https://via.placeholder.com/80/222222/FF5555?text=Emote";

    let allItems = [];
    let filteredItems = [];
    let currentPage = 1;
    const itemsPerPage = 30;
    let activeOB = null;

    // ================== تحميل البيانات ==================
    async function fetchData() {
        try {
            const res = await fetch(ITEM_DATA_URL);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            allItems = await res.json();
            filteredItems = [...allItems];
            renderItems();
            buildOBFilters();
            showToast(`✅ تم تحميل ${allItems.length} إيموجي`, false);
        } catch (err) {
            console.error(err);
            document.getElementById('itemsGrid').innerHTML = `<div style="text-align:center;padding:40px;">❌ فشل تحميل البيانات<br>${err.message}</div>`;
        }
    }

    // بناء أزرار التصفية حسب OB
    function buildOBFilters() {
        const versions = new Set();
        allItems.forEach(item => {
            let idStr = item.Id.toString();
            if (idStr.length >= 6) versions.add("OB" + idStr.substring(4,6));
        });
        const sorted = [...versions].sort((a,b) => parseInt(b.slice(2)) - parseInt(a.slice(2)));
        const container = document.getElementById('obFilterContainer');
        container.innerHTML = '<button class="ob-btn" data-ob="all">الكل</button>';
        sorted.forEach(ob => {
            const btn = document.createElement('button');
            btn.className = 'ob-btn';
            btn.innerText = ob;
            btn.dataset.ob = ob;
            btn.onclick = () => filterByOB(ob);
            container.appendChild(btn);
        });
        highlightActiveOB();
    }

    function filterByOB(ob) {
        activeOB = (ob === 'all') ? null : ob;
        if (activeOB) {
            const code = activeOB.slice(2);
            filteredItems = allItems.filter(item => item.Id.toString().startsWith("9090" + code));
        } else {
            filteredItems = [...allItems];
        }
        currentPage = 1;
        renderItems();
        highlightActiveOB();
    }

    function highlightActiveOB() {
        document.querySelectorAll('.ob-btn').forEach(btn => {
            if ((activeOB === null && btn.dataset.ob === 'all') || btn.dataset.ob === activeOB) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // عرض العناصر مع البحث
    function renderItems() {
        const searchTerm = document.getElementById('searchBox').value.toLowerCase().trim();
        let data = filteredItems.filter(item => 
            item.name.toLowerCase().includes(searchTerm) || 
            item.Id.toString().includes(searchTerm)
        );
        const grid = document.getElementById('itemsGrid');
        if (data.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:50px;">لا توجد نتائج</div>';
            updatePagination(0);
            return;
        }
        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = data.slice(start, start + itemsPerPage);
        grid.innerHTML = '';
        pageItems.forEach(item => {
            const card = document.createElement('div');
            card.className = 'emote-card';
            const imgUrl = `https://raw.githubusercontent.com/4737647734/Emote/main/emote_image/${item.Id}.png`;
            card.innerHTML = `
                <img src="${imgUrl}" onerror="this.src='${FALLBACK_IMG}'" alt="${item.name}">
                <div class="emote-id">${item.Id}</div>
                <div class="emote-name">${item.name}</div>
            `;
            card.onclick = () => sendEmote(item);
            grid.appendChild(card);
        });
        updatePagination(data.length);
    }

    function updatePagination(total) {
        const totalPages = Math.ceil(total / itemsPerPage);
        const pagDiv = document.getElementById('pagination');
        if (totalPages <= 1) {
            pagDiv.innerHTML = '';
            return;
        }
        pagDiv.innerHTML = '';
        for (let i = 1; i <= Math.min(totalPages, 6); i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            if (i === currentPage) btn.classList.add('active-page');
            btn.onclick = () => {
                currentPage = i;
                renderItems();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            pagDiv.appendChild(btn);
        }
    }

    // Toast
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : 'success'}`;
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.style.opacity = '1', 10);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 400);
        }, 3000);
    }

    // التحقق من عدد الـ UIDs
    function getUIDs() {
        const inputs = document.querySelectorAll('.uid-input');
        const uids = [];
        for (let inp of inputs) {
            let val = inp.value.trim();
            if (val && /^\d+$/.test(val)) uids.push(val);
        }
        if (uids.length > 5) {
            showToast('⚠️ الحد الأقصى 5 لاعبين فقط', true);
            return null;
        }
        if (uids.length === 0) {
            showToast('❌ يجب إدخال UID واحد على الأقل', true);
            return null;
        }
        return uids;
    }

    // إرسال الإيموجي عبر API الجديد
    async function sendEmote(item) {
        const teamCode = document.getElementById('teamCode').value.trim();
        let apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) apiKey = "ziko";
        if (!teamCode) {
            showToast('❌ أدخل كود الفريق', true);
            return;
        }
        const uidsArray = getUIDs();
        if (!uidsArray) return;

        // تحويل قائمة الـ UIDs إلى سلسلة مفصولة بفواصل كما يطلب API
        const uidsParam = uidsArray.join(',');

        const url = `${API_BASE}${API_DANCE}?emote_id=${item.Id}&team_code=${encodeURIComponent(teamCode)}&uids=${encodeURIComponent(uidsParam)}&api_key=${apiKey}`;
        
        showToast(`⏳ جاري إرسال ${item.name} ...`, false);
        try {
            const response = await fetch(url, { method: 'GET' });
            const data = await response.json();
            if (data.success) {
                showToast(`✅ ${data.message}`, false);
            } else {
                showToast(`❌ فشل: ${data.message || "خطأ غير معروف"}`, true);
            }
        } catch (err) {
            console.error(err);
            showToast(`❌ خطأ في الاتصال: ${err.message}`, true);
        }
    }

    // إضافة حقل UID جديد (بحد أقصى 5)
    document.getElementById('addUidBtn').onclick = () => {
        const container = document.getElementById('uidsContainer');
        const currentCount = document.querySelectorAll('.uid-input').length;
        if (currentCount >= 5) {
            showToast('⚠️ يمكن إضافة حتى 5 لاعبين فقط', true);
            return;
        }
        const newInput = document.createElement('input');
        newInput.type = 'text';
        newInput.className = 'uid-input';
        newInput.placeholder = `UID ${currentCount + 1}`;
        container.appendChild(newInput);
    };

    // بحث فوري
    let searchTimeout;
    document.getElementById('searchBox').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            currentPage = 1;
            renderItems();
        }, 300);
    });

    // تحميل أولي
    fetchData();
</script>
</body>
</html>
